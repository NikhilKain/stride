# JVM — keep temp files on D: as well
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -Djava.io.tmpdir=D\:/AndroidDev/tmp
org.gradle.java.home=D\:/AndroidDev/jdk/jdk-17.0.19+10
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official
